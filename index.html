<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Lost & Found</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Lost & Found</h1>
  <p>Reconnect with what matters</p>
</header>

<nav>
  <a href="index.html">Home</a>
  <a href="report.html">Report Item</a>
</nav>

<section class="container">
  <h2>Recently Reported Items</h2>
  <div id="itemsList"></div>
</section>

<footer>
  <p>Stay honest. Help others.</p>
</footer>

<script>
const items = JSON.parse(localStorage.getItem("lostItems")) || [];
const container = document.getElementById("itemsList");

if(items.length === 0){
  container.innerHTML = "<p>No items reported yet.</p>";
}

items.reverse().forEach(item => {
  const div = document.createElement("div");
  div.className = "card";

  div.innerHTML = `
    <h3>${item.type === "Lost" ? "❌ Lost" : "✅ Found"} - ${item.name}</h3>
    <p><strong>Description:</strong> ${item.desc}</p>
    <p><strong>Location:</strong> ${item.location}</p>
    <p><strong>Date:</strong> ${item.date}</p>
  `;

  container.appendChild(div);
});
</script>

</body>
</html>
